appId: com.imprestfms.app
productName: Imprest FMS
copyright: "Copyright © 2025 SIR APOLLO KAGGWA BPS"

directories:
  output: dist-electron

files:
  - dist/**/*
  - electron/**/*
  - "!electron/db/*.sqlite3"

extraResources:
  - from: electron/db/schema.sql
    to: schema.sql

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.png

linux:
  target:
    - AppImage
    - deb
  icon: assets/icon.svg
  category: Office
  description: Imprest Financial Management System

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Imprest FMS
  installerIcon: assets/icon.png
  uninstallerIcon: assets/icon.png

asar: true

# Publish settings — used by electron-updater to discover updates and by
# electron-builder's `--publish` flag (in CI) to upload artifacts to a
# GitHub release.
#
# Auth: in CI, electron-builder reads GH_TOKEN from the environment.
# Locally, you can use `--publish never` to skip publishing.
publish:
  provider: github
  owner: mayegamustafa
  repo: imprest
  releaseType: release   # 'draft' | 'prerelease' | 'release'

# Generate latest.yml / latest-linux.yml / latest-mac.yml in dist-electron/.
# electron-updater downloads these to decide whether a newer version exists.
generateUpdatesFilesForAllChannels: false
