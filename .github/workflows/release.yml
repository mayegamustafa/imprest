# Build and publish desktop installers when a version tag is pushed.
#
# To cut a release:
#   1. Bump the version:           npm version patch    (or minor / major)
#   2. Push the tag to GitHub:     git push --follow-tags
#   3. This workflow runs, builds for Windows + Linux, and uploads the
#      installers to a new GitHub Release named after the tag.
#   4. End users running the previous version see the update appear in
#      the app within an hour (electron-updater polls hourly).

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # required for electron-builder to create the release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux
          - os: windows-latest
            artifact: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux system deps (for AppImage + .deb)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libxss1 libgtk-3-0 \
            libnotify4 libxtst6 libuuid1 libatspi2.0-0 xdg-utils

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build & publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:win

      - name: Build & publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:linux

      - name: Upload artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: imprest-${{ matrix.artifact }}-${{ github.run_number }}
          path: |
            dist-electron/*.exe
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/latest*.yml
          if-no-files-found: ignore
          retention-days: 14
