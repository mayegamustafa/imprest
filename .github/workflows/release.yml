# Auto-publish desktop installers on every push to main.
# Workflow:
#   1. bump job: auto-increments patch version, commits, tags, pushes
#   2. build job: builds Windows + Linux installers and uploads to GitHub Release
#
# No manual tagging needed — just push to main.

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    # Skip if this commit is itself the auto-bump (prevents infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Bump patch version, commit, tag, push
        id: bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW=$(npm version patch --no-git-tag-version | sed 's/v//')
          git add package.json package-lock.json
          git commit -m "chore: bump version to v${NEW}"
          git tag "v${NEW}"
          git push origin main --follow-tags
          echo "tag=v${NEW}" >> "$GITHUB_OUTPUT"

  build:
    needs: bump
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux
          - os: windows-latest
            artifact: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Linux system deps (AppImage + .deb)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libxss1 libgtk-3-0 \
            libnotify4 libxtst6 libuuid1 libatspi2.0-0 xdg-utils

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build & publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:win

      - name: Build & publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:linux
          retention-days: 14
